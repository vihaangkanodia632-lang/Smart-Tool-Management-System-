<body>

<h1>Smart Tool Management System</h1>
<div class="subtitle">Complete Hardware + Software + Cloud Flowchart</div>

<div class="legend">

<svg width="900" viewBox="0 0 900 3020" xmlns="http://www.w3.org/2000/svg">

  <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5"

  <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5"

    <path d="M1 1L9 5L1 9" fill="none" stroke="#e8403a" stroke-width="1.5"

  <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5"

<!-- ═══════════════════════════════════════

<!-- ── START ──────────────────────────── -->
